<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운동일지</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #f5f2ed;
  --paper: #faf8f5;
  --ink: #1a1a18;
  --ink2: #4a4a46;
  --ink3: #8a8a84;
  --rule: #ddd8ce;
  --accent: #2d5a3d;
  --accent-light: #eaf3ec;
  --accent2: #8b4513;
  --warn: #c0392b;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
}

/* ── 레이아웃 ── */
.shell {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 24px 100px;
}

/* ── 헤더 ── */
.app-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 14px;
  margin-bottom: 36px;
}

.app-title {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.app-title span {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--ink3);
  display: block;
  letter-spacing: 0.05em;
  margin-bottom: 2px;
  font-weight: 400;
}

.header-actions { display: flex; gap: 8px; }

/* ── 탭 ── */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--rule);
}

.tab {
  font-family: var(--mono);
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  padding: 10px 20px;
  cursor: pointer;
  color: var(--ink3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 500;
}

.tab:hover:not(.active) { color: var(--ink2); }

.panel { display: none; }
.panel.active { display: block; }

/* ── 버튼 ── */
.btn {
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 0.05em;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: #1e3d2a; }

.btn-ghost {
  background: transparent;
  color: var(--ink2);
  border-color: var(--rule);
}
.btn-ghost:hover { border-color: var(--ink3); color: var(--ink); }

.btn-danger {
  background: transparent;
  color: var(--warn);
  border-color: transparent;
  padding: 4px 8px;
  font-size: 0.68rem;
}
.btn-danger:hover { border-color: var(--warn); }

/* ── 입력 폼 ── */
.form-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 28px 28px 24px;
  margin-bottom: 28px;
}

.form-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  color: var(--ink3);
  text-transform: uppercase;
}

.field input, .field select {
  font-family: var(--sans);
  font-size: 0.85rem;
  padding: 8px 12px;
  border: 1px solid var(--rule);
  border-radius: 5px;
  background: #fff;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }

.field.f-date input { width: 140px; font-family: var(--mono); }
.field.f-name input { width: 170px; }
.field.f-weight input { width: 90px; font-family: var(--mono); }
.field.f-sets input { width: 80px; font-family: var(--mono); }
.field.f-reps input { width: 80px; font-family: var(--mono); }
.field.f-note input { width: 200px; }

.exercises-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }

.ex-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 6px;
  border: 1px solid var(--rule);
}

.ex-num {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--ink3);
  width: 20px;
  flex-shrink: 0;
}

.ex-input-row input {
  font-family: var(--sans);
  font-size: 0.82rem;
  padding: 6px 10px;
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: #fff;
  color: var(--ink);
  outline: none;
}
.ex-input-row input:focus { border-color: var(--accent); }

.in-name  { width: 150px; }
.in-weight{ width: 75px; font-family: var(--mono); }
.in-sets  { width: 60px; font-family: var(--mono); }
.in-reps  { width: 60px; font-family: var(--mono); }
.in-note  { flex: 1; min-width: 100px; color: var(--ink3); }

.col-hint {
  display: flex;
  gap: 8px;
  padding: 0 12px;
  margin-bottom: 4px;
}
.col-hint span {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--ink3);
  letter-spacing: 0.05em;
}
.ch-num  { width: 20px; }
.ch-name { width: 150px; }
.ch-w    { width: 75px; }
.ch-s    { width: 60px; }
.ch-r    { width: 60px; }

.add-ex-btn {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--accent);
  background: none;
  border: 1px dashed var(--accent);
  border-radius: 6px;
  padding: 7px 16px;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}
.add-ex-btn:hover { background: var(--accent-light); }

.form-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  padding-top: 16px;
  border-top: 1px solid var(--rule);
}

/* ── 세션 목록 ── */
.session-list { display: flex; flex-direction: column; gap: 12px; }

.session-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 10px;
  overflow: hidden;
  transition: box-shadow 0.15s;
}
.session-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

.session-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px 12px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s;
}
.session-card.open .session-head { border-bottom-color: var(--rule); }

.session-date {
  font-family: var(--mono);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.03em;
}

.session-summary {
  font-size: 0.78rem;
  color: var(--ink3);
  margin-top: 2px;
}

.session-meta {
  display: flex;
  align-items: center;
  gap: 12px;
}

.session-source {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  padding: 2px 8px;
  border-radius: 12px;
  background: var(--bg);
  color: var(--ink3);
  border: 1px solid var(--rule);
}
.src-session { background: #fff8ee; color: #8b4513; border-color: #ddd0b8; }
.src-personal { background: var(--accent-light); color: var(--accent); border-color: #c0dcc8; }

.session-chevron {
  font-size: 0.7rem;
  color: var(--ink3);
  transition: transform 0.2s;
}
.session-card.open .session-chevron { transform: rotate(180deg); }

.session-body {
  display: none;
  padding: 16px 20px 14px;
}
.session-card.open .session-body { display: block; }

.ex-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}

.ex-table th {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  color: var(--ink3);
  text-align: left;
  padding: 0 10px 8px 0;
  border-bottom: 1px solid var(--rule);
  text-transform: uppercase;
}

.ex-table td {
  padding: 7px 10px 7px 0;
  border-bottom: 1px solid var(--bg);
  vertical-align: top;
}
.ex-table tr:last-child td { border-bottom: none; }

.td-num {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--ink3);
  width: 24px;
}
.td-name { font-weight: 400; }
.td-weight, .td-sets, .td-reps {
  font-family: var(--mono);
  color: var(--ink2);
  width: 70px;
}
.td-note { color: var(--ink3); font-size: 0.72rem; }

.session-foot {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding-top: 10px;
}

/* ── 필터바 ── */
.filter-bar {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-bar input, .filter-bar select {
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 7px 12px;
  border: 1px solid var(--rule);
  border-radius: 5px;
  background: #fff;
  color: var(--ink);
  outline: none;
}
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
.filter-bar input { width: 160px; }

.count-badge {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--ink3);
  margin-left: auto;
}

/* ── 추이 탭 ── */
.trend-controls {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  align-items: center;
  flex-wrap: wrap;
}

.trend-controls select, .trend-controls input {
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 7px 12px;
  border: 1px solid var(--rule);
  border-radius: 5px;
  background: #fff;
  color: var(--ink);
  outline: none;
}
.trend-controls select:focus, .trend-controls input:focus { border-color: var(--accent); }

#trend-chart-wrap {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 24px;
}

#trend-title {
  font-weight: 500;
  margin-bottom: 4px;
}
#trend-subtitle {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--ink3);
  margin-bottom: 20px;
}

svg#trend-svg {
  width: 100%;
  height: 220px;
  overflow: visible;
}

.trend-points-list {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.tp-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.78rem;
}
.tp-date { font-family: var(--mono); color: var(--ink3); width: 90px; }
.tp-bar-wrap { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.tp-bar { height: 100%; border-radius: 3px; background: var(--accent); }
.tp-val { font-family: var(--mono); width: 70px; text-align: right; }
.tp-note { color: var(--ink3); font-size: 0.68rem; }

/* ── 내보내기 ── */
.export-section {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 24px;
  margin-top: 8px;
}
.export-section h3 {
  font-size: 0.85rem;
  font-weight: 500;
  margin-bottom: 6px;
}
.export-section p {
  font-size: 0.78rem;
  color: var(--ink3);
  margin-bottom: 16px;
  line-height: 1.6;
}
.export-actions { display: flex; gap: 10px; flex-wrap: wrap; }

/* ── 알림 토스트 ── */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: #fff;
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 10px 20px;
  border-radius: 20px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s;
  z-index: 999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── 빈 상태 ── */
.empty {
  text-align: center;
  padding: 60px 0;
  color: var(--ink3);
  font-size: 0.85rem;
}
.empty-icon { font-size: 2rem; margin-bottom: 12px; }

/* ── 편집 모달 ── */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#modal-overlay.show { display: flex; }
#modal {
  background: var(--paper);
  border-radius: 12px;
  padding: 28px;
  width: min(600px, 95vw);
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
#modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="shell">

  <header class="app-header">
    <div class="app-title">
      <span>WORKOUT LOG</span>
      운동일지
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="exportJSON()">JSON 내보내기</button>
      <button class="btn btn-ghost" onclick="exportCSV()">CSV 내보내기</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('log')">기록 조회</button>
    <button class="tab" onclick="switchTab('add')">새 세션 입력</button>
    <button class="tab" onclick="switchTab('trend')">추이 분석</button>
  </div>

  <!-- ══ 기록 조회 패널 ══ -->
  <div class="panel active" id="panel-log">
    <div class="filter-bar">
      <input type="text" id="filter-ex" placeholder="운동명 검색…" oninput="renderLog()">
      <select id="filter-src" onchange="renderLog()">
        <option value="">전체 출처</option>
        <option value="session">세션지</option>
        <option value="personal">개인일지</option>
      </select>
      <span class="count-badge" id="session-count"></span>
    </div>
    <div class="session-list" id="session-list"></div>
  </div>

  <!-- ══ 새 세션 입력 패널 ══ -->
  <div class="panel" id="panel-add">
    <div class="form-card">
      <div class="form-row">
        <div class="field f-date">
          <label>날짜</label>
          <input type="date" id="in-date">
        </div>
        <div class="field" style="flex:1;min-width:160px">
          <label>메모 (선택)</label>
          <input type="text" id="in-memo" placeholder="예: 포르투 짐, 컨디션 보통">
        </div>
        <div class="field">
          <label>출처</label>
          <select id="in-src">
            <option value="personal">개인일지</option>
            <option value="session">세션지</option>
          </select>
        </div>
      </div>

      <div class="col-hint">
        <span class="ch-num">#</span>
        <span class="ch-name">운동명</span>
        <span class="ch-w">무게(kg)</span>
        <span class="ch-s">세트</span>
        <span class="ch-r">횟수</span>
        <span style="flex:1">메모</span>
      </div>

      <div class="exercises-list" id="ex-inputs"></div>

      <button class="add-ex-btn" onclick="addExRow()">+ 운동 추가</button>

      <div class="form-actions">
        <button class="btn btn-ghost" onclick="clearForm()">초기화</button>
        <button class="btn btn-primary" onclick="saveSession()">세션 저장</button>
      </div>
    </div>
  </div>

  <!-- ══ 추이 분석 패널 ══ -->
  <div class="panel" id="panel-trend">
    <div class="trend-controls">
      <select id="trend-ex" onchange="renderTrend()">
        <option value="">운동 선택…</option>
      </select>
    </div>
    <div id="trend-chart-wrap">
      <div id="trend-title" style="color:var(--ink3);font-size:0.85rem">왼쪽에서 운동을 선택하면 추이가 표시됩니다.</div>
      <div id="trend-subtitle"></div>
      <svg id="trend-svg" style="display:none"></svg>
      <div class="trend-points-list" id="trend-points"></div>
    </div>
  </div>

</div><!-- /shell -->

<div id="toast"></div>

<!-- 편집 모달 -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <h2>세션 편집</h2>
    <div id="modal-body"></div>
    <div class="form-actions" style="margin-top:20px">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

// ═══════════════════════════════════════════════
// 스토리지 (localStorage 래퍼 — 브라우저에 저장)
// ═══════════════════════════════════════════════
function loadData() {
  try {
    const raw = localStorage.getItem('workout_log');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(SEED));
}

function saveData(data) {
  try { localStorage.setItem('workout_log', JSON.stringify(data)); } catch(e) {}
}

let DB = loadData();

// 혹시 로컬스토리지 없으면 in-memory
if (!DB || !DB.length) DB = JSON.parse(JSON.stringify(SEED));

// ═══════════════════════════════════════════════
// 유틸
// ═══════════════════════════════════════════════
function uid() { return 'u' + Date.now() + Math.random().toString(36).slice(2,6); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function fmt(val) { return val || '—'; }

// ═══════════════════════════════════════════════
// 탭 전환
// ═══════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['log','add','trend'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'trend') populateTrendSelect();
}

// ═══════════════════════════════════════════════
// 기록 조회
// ═══════════════════════════════════════════════
function renderLog() {
  const exFilter = document.getElementById('filter-ex').value.trim().toLowerCase();
  const srcFilter = document.getElementById('filter-src').value;

  let sessions = [...DB].sort((a,b) => b.date.localeCompare(a.date));

  if (srcFilter) sessions = sessions.filter(s => s.src === srcFilter);
  if (exFilter) sessions = sessions.filter(s =>
    s.exercises.some(e => e.name.toLowerCase().includes(exFilter))
  );

  document.getElementById('session-count').textContent = `${sessions.length}개 세션`;

  const list = document.getElementById('session-list');
  if (!sessions.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>조건에 맞는 세션이 없습니다.</div>`;
    return;
  }

  list.innerHTML = sessions.map(s => {
    const exNames = [...new Set(s.exercises.map(e => e.name))].slice(0,4).join(', ')
      + (s.exercises.length > 4 ? ` 외 ${s.exercises.length - 4}종` : '');
    const srcClass = s.src === 'session' ? 'src-session' : 'src-personal';
    const srcLabel = s.src === 'session' ? '세션지' : '개인일지';

    const rows = s.exercises.map((e,i) => `
      <tr>
        <td class="td-num">${i+1}</td>
        <td class="td-name">${e.name}</td>
        <td class="td-weight">${fmt(e.weight)}</td>
        <td class="td-sets">${fmt(e.sets)}</td>
        <td class="td-reps">${fmt(e.reps)}</td>
        <td class="td-note">${e.note||''}</td>
      </tr>`).join('');

    const memoHtml = s.memo ? `<span style="font-size:0.7rem;color:var(--ink3);margin-left:10px;font-family:var(--mono)">${s.memo}</span>` : '';

    return `
    <div class="session-card" id="card-${s.id}">
      <div class="session-head" onclick="toggleCard('${s.id}')">
        <div>
          <div class="session-date">${s.date}${memoHtml}</div>
          <div class="session-summary">${exNames}</div>
        </div>
        <div class="session-meta">
          <span class="session-source ${srcClass}">${srcLabel}</span>
          <span class="session-chevron">▼</span>
        </div>
      </div>
      <div class="session-body">
        <table class="ex-table">
          <thead><tr>
            <th style="width:24px">#</th>
            <th>운동명</th><th>무게(kg)</th><th>세트</th><th>횟수</th><th>메모</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="session-foot">
          <button class="btn btn-danger" onclick="deleteSession('${s.id}')">삭제</button>
          <button class="btn btn-ghost" onclick="openEdit('${s.id}')" style="font-size:0.72rem;padding:5px 12px">편집</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  document.getElementById('card-' + id).classList.toggle('open');
}

function deleteSession(id) {
  if (!confirm('이 세션을 삭제할까요?')) return;
  DB = DB.filter(s => s.id !== id);
  saveData(DB);
  renderLog();
  toast('세션이 삭제되었습니다.');
}

// ═══════════════════════════════════════════════
// 새 세션 입력
// ═══════════════════════════════════════════════
let exRowCount = 0;

function addExRow(data) {
  exRowCount++;
  const n = exRowCount;
  const d = data || {};
  const row = document.createElement('div');
  row.className = 'ex-input-row';
  row.id = 'exrow-' + n;
  row.innerHTML = `
    <span class="ex-num">${n}</span>
    <input class="in-name"   placeholder="운동명" value="${d.name||''}">
    <input class="in-weight" placeholder="무게" value="${d.weight||''}">
    <input class="in-sets"   placeholder="세트" value="${d.sets||''}">
    <input class="in-reps"   placeholder="횟수" value="${d.reps||''}">
    <input class="in-note"   placeholder="메모" value="${d.note||''}">
    <button class="btn btn-danger" onclick="removeExRow(${n})">✕</button>
  `;
  document.getElementById('ex-inputs').appendChild(row);
}

function removeExRow(n) {
  const el = document.getElementById('exrow-' + n);
  if (el) el.remove();
}

function clearForm() {
  document.getElementById('in-date').value = '';
  document.getElementById('in-memo').value = '';
  document.getElementById('in-src').value = 'personal';
  document.getElementById('ex-inputs').innerHTML = '';
  exRowCount = 0;
  addExRow(); addExRow(); addExRow();
}

function saveSession() {
  const date = document.getElementById('in-date').value;
  if (!date) { alert('날짜를 입력해주세요.'); return; }

  const exercises = [];
  document.querySelectorAll('.ex-input-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const name = inputs[0].value.trim();
    if (!name) return;
    exercises.push({
      name,
      weight: inputs[1].value.trim(),
      sets:   inputs[2].value.trim(),
      reps:   inputs[3].value.trim(),
      note:   inputs[4].value.trim(),
    });
  });

  if (!exercises.length) { alert('운동을 하나 이상 입력해주세요.'); return; }

  const session = {
    id: uid(),
    date,
    src: document.getElementById('in-src').value,
    memo: document.getElementById('in-memo').value.trim(),
    exercises,
  };

  DB.push(session);
  saveData(DB);
  toast('✓ 세션이 저장되었습니다.');
  clearForm();
  switchTab('log');
  renderLog();
}

function addEditRow() {
  const list = document.getElementById('edit-ex-list');
  const n = list.children.length + 1;

  div.className = 'ex-input-row';

    <input class="in-weight" placeholder="무게">
    <input class="in-sets"   placeholder="세트">
    <input class="in-reps"   placeholder="횟수">

    <button class="btn btn-danger" onclick="this.closest('.ex-input-row').remove()">✕</button>

function saveEdit() {
  const s = DB.find(x => x.id === editingId);
  if (!s) return;
  s.date = document.getElementById('edit-date').value;
  s.memo = document.getElementById('edit-memo').value.trim();
  s.src  = document.getElementById('edit-src').value;
  s.exercises = [];
  document.querySelectorAll('#edit-ex-list .ex-input-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const name = inputs[0].value.trim();
    if (!name) return;
    s.exercises.push({
      name, weight: inputs[1].value.trim(),
      sets: inputs[2].value.trim(), reps: inputs[3].value.trim(),
      note: inputs[4].value.trim(),
    });
  });
  saveData(DB);
  closeModal();
  renderLog();
  toast('✓ 편집 내용이 저장되었습니다.');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('show');
  editingId = null;
}

// ═══════════════════════════════════════════════
// 추이 분석
// ═══════════════════════════════════════════════
function populateTrendSelect() {
  const sel = document.getElementById('trend-ex');
  const cur = sel.value;
  // 모든 운동명 수집, 2회 이상 등장한 것만
  const counts = {};
  DB.forEach(s => s.exercises.forEach(e => {
    if (e.name) counts[e.name] = (counts[e.name]||0) + 1;
  }));
  const names = Object.keys(counts).filter(n => counts[n] >= 2).sort();
  sel.innerHTML = '<option value="">운동 선택…</option>' +
    names.map(n => `<option value="${n}" ${n===cur?'selected':''}>${n} (${counts[n]}회)</option>`).join('');
}

function renderTrend() {
  const name = document.getElementById('trend-ex').value;
  const title = document.getElementById('trend-title');
  const sub = document.getElementById('trend-subtitle');
  const svg = document.getElementById('trend-svg');
  const pts = document.getElementById('trend-points');

  if (!name) {
    title.textContent = '운동을 선택하면 추이가 표시됩니다.';
    title.style.color = 'var(--ink3)';
    sub.textContent = '';
    svg.style.display = 'none';
    pts.innerHTML = '';
    return;
  }

  // 해당 운동의 모든 기록 수집
  const records = [];
  DB.forEach(s => {
    s.exercises.forEach(e => {
      if (e.name === name) {
        // 무게 숫자 추출 시도
        const wNum = parseFloat(String(e.weight).replace(/[^0-9.]/g,''));
        records.push({
          date: s.date,
          weight: e.weight,
          wNum: isNaN(wNum) ? null : wNum,
          sets: e.sets,
          reps: e.reps,
          note: e.note||'',
          src: s.src,
        });
      }
    });
  });
  records.sort((a,b) => a.date.localeCompare(b.date));

  title.textContent = name;
  title.style.color = 'var(--ink)';
  sub.textContent = `총 ${records.length}회 기록 · ${records[0].date} → ${records[records.length-1].date}`;

  // 수치 있는 것만 차트
  const chartPts = records.filter(r => r.wNum !== null);
  if (chartPts.length >= 2) {
    svg.style.display = 'block';
    drawTrendChart(chartPts);
  } else {
    svg.style.display = 'none';
  }

  // 데이터 행
  const maxW = Math.max(...records.map(r => r.wNum||0), 1);
  pts.innerHTML = records.map(r => {
    const pct = r.wNum ? Math.round((r.wNum/maxW)*100) : 0;
    const srcDot = r.src === 'personal'
      ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0"></span>`
      : `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#c8a060;flex-shrink:0"></span>`;
    return `<div class="tp-row">
      <span class="tp-date">${r.date}</span>
      ${srcDot}
      <div class="tp-bar-wrap"><div class="tp-bar" style="width:${pct}%"></div></div>
      <span class="tp-val" style="color:var(--accent)">${r.weight ? r.weight+'kg' : '—'}</span>
      <span class="tp-note">${r.sets ? r.sets+'세트' : ''} ${r.reps ? r.reps+'회' : ''} ${r.note}</span>
    </div>`;
  }).join('');
}

function drawTrendChart(data) {
  const svg = document.getElementById('trend-svg');
  const W = svg.clientWidth || 600;
  const H = 200;
  const PAD = { top: 20, right: 20, bottom: 30, left: 36 };
  const iW = W - PAD.left - PAD.right;
  const iH = H - PAD.top - PAD.bottom;

  const vals = data.map(d => d.wNum);
  const minV = Math.min(...vals) * 0.85;
  const maxV = Math.max(...vals) * 1.08;

  const xScale = i => PAD.left + (i / (data.length - 1)) * iW;
  const yScale = v => PAD.top + iH - ((v - minV) / (maxV - minV)) * iH;

  const pathD = data.map((d,i) => `${i===0?'M':'L'}${xScale(i)},${yScale(d.wNum)}`).join(' ');
  const areaD = pathD + ` L${xScale(data.length-1)},${PAD.top+iH} L${xScale(0)},${PAD.top+iH} Z`;

  const circles = data.map((d,i) =>
    `<circle cx="${xScale(i)}" cy="${yScale(d.wNum)}" r="4"
      fill="${d.src==='personal'?'#2d5a3d':'#c8a060'}"
      stroke="white" stroke-width="1.5"/>
     <text x="${xScale(i)}" y="${yScale(d.wNum)-10}" text-anchor="middle"
       font-size="9" font-family="IBM Plex Mono,monospace" fill="#4a4a46">${d.wNum}</text>`
  ).join('');

  const xLabels = data.map((d,i) =>
    `<text x="${xScale(i)}" y="${H-2}" text-anchor="middle"
      font-size="9" font-family="IBM Plex Mono,monospace" fill="#8a8a84">${d.date.slice(5)}</text>`
  ).join('');

  svg.innerHTML = `
    <defs>
      <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2d5a3d" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#2d5a3d" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${PAD.top+iH}"
      stroke="#ddd8ce" stroke-width="1"/>
    <line x1="${PAD.left}" y1="${PAD.top+iH}" x2="${PAD.left+iW}" y2="${PAD.top+iH}"
      stroke="#ddd8ce" stroke-width="1"/>
    <path d="${areaD}" fill="url(#tg)"/>
    <path d="${pathD}" fill="none" stroke="#2d5a3d" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round"/>
    ${circles}
    ${xLabels}
    <text x="${PAD.left-6}" y="${PAD.top+5}" text-anchor="end"
      font-size="9" font-family="IBM Plex Mono,monospace" fill="#8a8a84">${Math.round(maxV)}</text>
    <text x="${PAD.left-6}" y="${PAD.top+iH+3}" text-anchor="end"
      font-size="9" font-family="IBM Plex Mono,monospace" fill="#8a8a84">${Math.round(minV)}</text>
  `;
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '운동일지_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('JSON 파일이 저장되었습니다.');
}

function exportCSV() {
  const rows = [['날짜','출처','메모','운동명','무게','세트','횟수','운동메모']];
  DB.sort((a,b) => a.date.localeCompare(b.date)).forEach(s => {
    s.exercises.forEach(e => {
      rows.push([s.date, s.src==='personal'?'개인일지':'세션지', s.memo||'',
        e.name, e.weight||'', e.sets||'', e.reps||'', e.note||'']);
    });
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '운동일지_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast('CSV 파일이 저장되었습니다.');
}
